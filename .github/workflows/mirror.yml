name: Mirror to Codeberg

on: [push, delete, create]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg Mirror
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          # Configure Codeberg authenticated URL using your secret token
          git remote add codeberg https://YuvalKolodkin:${CODEBERG_TOKEN}@codeberg.org/YuvalKolodkin/Calculab.git

          # Refresh remote-tracking refs so the mirror reflects current GitHub state.
          # Push from refs/remotes/origin/* instead of local refs/heads/* to avoid
          # conflicts with the checked-out branch and to include every branch.
          git fetch origin
          git push --prune --force codeberg 'refs/remotes/origin/*:refs/heads/*'
          git push --prune --force codeberg 'refs/tags/*:refs/tags/*'
